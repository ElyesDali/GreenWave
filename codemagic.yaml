workflows:
  ios-workflow:
    name: GreenWave iOS Build
    instance_type: mac_mini_m2
    environment:
      groups:
        - mapbox
      flutter: default
      xcode: latest
      cocoapods: default
    scripts:
      - name: Configuration du token Mapbox (iOS)
        script: |
          echo "machine api.mapbox.com login mapbox password $MAPBOX_DOWNLOADS_TOKEN" > ~/.netrc
          chmod 0600 ~/.netrc
      - name: Get Flutter packages
        script: flutter pub get
      - name: Generate Podfile and Fix iOS Version
        script: |
          # 1. Demande au Mac de Codemagic de générer le Podfile manquant
          flutter build ios --config-only
          # 2. Force la version 14.0 dans le fichier généré
          sed -i '' "s/^# platform :ios.*/platform :ios, '14.0'/g" ios/Podfile
      - name: Install iOS Pods
        script: |
          cd ios
          pod install
      - name: Build iOS app & Create IPA for AltStore
        script: |
          # 1. Compilation
          flutter build ios --release --no-codesign
          
          # 2. On s'assure d'être à la racine du projet
          cd $CM_BUILD_DIR
          rm -rf Payload GreenWave.ipa
          mkdir Payload
          
          # 3. On trouve le Runner.app (peu importe où Flutter l'a mis) et on le copie
          APP_PATH=$(find build -name "Runner.app" -type d | head -n 1)
          cp -Rp "$APP_PATH" Payload/
          
          # 4. Création du fichier .ipa final
          zip -ry GreenWave.ipa Payload
          
    artifacts:
      - GreenWave.ipa