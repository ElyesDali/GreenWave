workflows:
  ios-workflow:
    name: GreenWave iOS Build
    instance_type: mac_mini_m2
    environment:
      groups:
        - mapbox
      flutter: default
      xcode: latest
      cocoapods: default
    scripts:
      - name: Configuration du token Mapbox (iOS)
        script: |
          echo "machine api.mapbox.com login mapbox password $MAPBOX_DOWNLOADS_TOKEN" > ~/.netrc
          chmod 0600 ~/.netrc
      - name: Get Flutter packages
        script: flutter pub get
      - name: Generate Podfile and Fix iOS Version
        script: |
          # 1. Demande au Mac de Codemagic de générer le Podfile manquant
          flutter build ios --config-only
          # 2. Force la version 14.0 dans le fichier généré
          sed -i '' "s/^# platform :ios.*/platform :ios, '14.0'/g" ios/Podfile
      - name: Install iOS Pods
        script: |
          cd ios
          pod install
      - name: Build iOS app & Create IPA for AltStore
        script: |
          # 1. Nettoyage radical des anciens builds parasites
          rm -rf build/ios
          
          # 2. Compilation
          flutter build ios --release --no-codesign
          
          # 3. Affichage du poids de l'application (pour le diagnostic)
          echo "=== TAILLE DU DOSSIER GENERE ==="
          du -sh build/ios/iphoneos/Runner.app || echo "Dossier introuvable"
          
          # 4. Création de l'archive AltStore
          cd $CM_BUILD_DIR
          rm -rf Payload GreenWave.ipa
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -qr GreenWave.ipa Payload
          
          # 5. Affichage du poids de l'IPA final
          echo "=== TAILLE DE L'ARCHIVE FINALE ==="
          ls -lh GreenWave.ipa
    artifacts:
      - GreenWave.ipa