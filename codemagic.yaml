workflows:
  ios-workflow:
    name: GreenWave iOS Build
    instance_type: mac_mini_m2
    environment:
      groups:
        - mapbox
      flutter: default
      xcode: latest
      cocoapods: default
    scripts:
      - name: Configuration du token Mapbox (iOS)
        script: |
          echo "machine api.mapbox.com login mapbox password $MAPBOX_DOWNLOADS_TOKEN" > ~/.netrc
          chmod 0600 ~/.netrc
      - name: Get Flutter packages
        script: flutter pub get
      - name: Generate Podfile and Fix iOS Version
        script: |
          # 1. Demande au Mac de Codemagic de générer le Podfile manquant
          flutter build ios --config-only
          # 2. Force la version 14.0 dans le fichier généré
          sed -i '' "s/^# platform :ios.*/platform :ios, '14.0'/g" ios/Podfile
      - name: Install iOS Pods
        script: |
          cd ios
          pod install
      - name: Build iOS app (Unsigned for testing)
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app